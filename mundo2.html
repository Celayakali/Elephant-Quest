<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo 2: Desierto Dorado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; user-select: none; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #gameContainer { position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; background: #000; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; color: white; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 10; }
        #controls { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; z-index: 10; }
        .btn { width: 65px; height: 65px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); cursor: pointer; pointer-events: all; }
        .btn:active { background: rgba(255,255,255,0.5); }
        #backBtn { position: absolute; top: 50px; left: 15px; background: rgba(0,0,0,0.5); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; z-index: 20; }
        #backBtn:hover { background: rgba(0,0,0,0.8); }
        @media (max-width: 900px) { #controls { display: flex; } }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <span id="scoreText">💎 0</span>
            <span id="livesText">❤️ 3</span>
            <span id="levelText">Nivel 1/3</span>
        </div>
        <button id="backBtn" onclick="goBack()">← Volver</button>
        <div id="controls">
            <div class="btn" id="btnLeft">←</div>
            <div class="btn" id="btnJump">↑</div>
            <div class="btn" id="btnRight">→</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'jump') { osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
            else if (type === 'coin') { osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1200, now + 0.05); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15); }
            else if (type === 'hit') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); }
            else if (type === 'win') { osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(500, now + 0.1); osc.frequency.setValueAtTime(600, now + 0.2); osc.frequency.setValueAtTime(800, now + 0.3); gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.6); osc.start(now); osc.stop(now + 0.6); }
        }

        const GRAVITY = 0.6, JUMP_FORCE = -12, MOVE_SPEED = 5, FRICTION = 0.85;
        let gameState = 'MENU';
        let currentLevel = 0, score = 0, lives = 3, camera = { x: 0, y: 0 }, particles = [];
        const keys = {};
        let touchInput = { left: false, right: false, jump: false };

        const player = { x: 100, y: 300, width: 40, height: 50, vx: 0, vy: 0, onGround: false, facing: 1, animTimer: 0, invincible: 0, dead: false };

        const levels = [
            {
                width: 2200,
                platforms: [
                    { x: 0, y: 550, w: 500, h: 50 }, { x: 600, y: 480, w: 150, h: 30 }, { x: 850, y: 400, w: 100, h: 30 },
                    { x: 1100, y: 320, w: 200, h: 30 }, { x: 1400, y: 420, w: 150, h: 30 }, { x: 1700, y: 350, w: 100, h: 30 },
                    { x: 1900, y: 550, w: 400, h: 50 },
                ],
                coins: [
                    { x: 650, y: 440, collected: false }, { x: 700, y: 440, collected: false }, { x: 900, y: 360, collected: false },
                    { x: 1150, y: 280, collected: false }, { x: 1200, y: 280, collected: false }, { x: 1450, y: 380, collected: false },
                    { x: 1750, y: 310, collected: false },
                ],
                enemies: [
                    { x: 300, y: 520, w: 30, h: 30, vx: 2.5, minX: 250, maxX: 470 }, { x: 1150, y: 290, w: 30, h: 30, vx: 2, minX: 1110, maxX: 1290 },
                    { x: 2000, y: 520, w: 30, h: 30, vx: 3, minX: 1920, maxX: 2280 },
                ],
                flag: { x: 2150, y: 450 }
            },
            {
                width: 2800,
                platforms: [
                    { x: 0, y: 550, w: 350, h: 50 }, { x: 450, y: 500, w: 80, h: 20 }, { x: 650, y: 430, w: 80, h: 20 },
                    { x: 850, y: 360, w: 150, h: 20 }, { x: 1150, y: 450, w: 100, h: 20 }, { x: 1400, y: 380, w: 100, h: 20 },
                    { x: 1650, y: 300, w: 200, h: 20 }, { x: 2000, y: 400, w: 100, h: 20 }, { x: 2250, y: 480, w: 100, h: 20 },
                    { x: 2450, y: 550, w: 450, h: 50 },
                ],
                coins: [
                    { x: 900, y: 320, collected: false }, { x: 950, y: 320, collected: false }, { x: 1200, y: 410, collected: false },
                    { x: 1450, y: 340, collected: false }, { x: 1700, y: 260, collected: false }, { x: 1750, y: 260, collected: false },
                    { x: 2050, y: 360, collected: false }, { x: 2300, y: 440, collected: false },
                ],
                enemies: [
                    { x: 1700, y: 270, w: 30, h: 30, vx: 2.5, minX: 1660, maxX: 1830 }, { x: 450, y: 470, w: 30, h: 30, vx: 2, minX: 450, maxX: 530 },
                    { x: 2500, y: 520, w: 30, h: 30, vx: 3, minX: 2470, maxX: 2880 }, { x: 2700, y: 520, w: 30, h: 30, vx: -2.5, minX: 2470, maxX: 2880 },
                ],
                flag: { x: 2700, y: 470 }
            },
            {
                width: 3500,
                platforms: [
                    { x: 0, y: 550, w: 300, h: 50 }, { x: 400, y: 480, w: 60, h: 20 }, { x: 550, y: 410, w: 60, h: 20 },
                    { x: 700, y: 340, w: 60, h: 20 }, { x: 900, y: 280, w: 150, h: 20 }, { x: 1200, y: 380, w: 80, h: 20 },
                    { x: 1450, y: 300, w: 80, h: 20 }, { x: 1700, y: 220, w: 200, h: 20 }, { x: 2050, y: 320, w: 80, h: 20 },
                    { x: 2300, y: 400, w: 80, h: 20 }, { x: 2550, y: 480, w: 80, h: 20 }, { x: 2800, y: 550, w: 800, h: 50 },
                ],
                coins: [
                    { x: 950, y: 240, collected: false }, { x: 1000, y: 240, collected: false }, { x: 1050, y: 240, collected: false },
                    { x: 1230, y: 340, collected: false }, { x: 1480, y: 260, collected: false }, { x: 1750, y: 180, collected: false },
                    { x: 1800, y: 180, collected: false }, { x: 1850, y: 180, collected: false }, { x: 2080, y: 280, collected: false },
                    { x: 2330, y: 360, collected: false },
                ],
                enemies: [
                    { x: 950, y: 250, w: 30, h: 30, vx: 2.5, minX: 910, maxX: 1040 }, { x: 1750, y: 190, w: 30, h: 30, vx: 3.5, minX: 1710, maxX: 1890 },
                    { x: 2900, y: 520, w: 30, h: 30, vx: 3, minX: 2820, maxX: 3580 }, { x: 3100, y: 520, w: 30, h: 30, vx: -3, minX: 2820, maxX: 3580 },
                    { x: 3300, y: 520, w: 30, h: 30, vx: 2.5, minX: 2820, maxX: 3580 },
                ],
                flag: { x: 3400, y: 470 }
            }
        ];

        let currentLevelData = null;

        function createParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 1, color: color });
            }
        }

        function drawElephant(x, y, scale, facing, animFrame) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(facing * scale, scale);
            const bodyColor = '#7a8b99', darkColor = '#5a6b79', lightColor = '#9aabba';
            const walkOffset = Math.sin(animFrame * 0.2) * 3;
            ctx.fillStyle = darkColor; ctx.fillRect(-12, 15, 8, 15 + walkOffset);
            ctx.fillStyle = bodyColor; ctx.fillRect(4, 15, 8, 15 - walkOffset);
            ctx.fillStyle = bodyColor; ctx.beginPath(); ctx.ellipse(0, 5, 18, 16, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = lightColor; ctx.beginPath(); ctx.arc(8, -8, 14, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = bodyColor; ctx.beginPath(); ctx.ellipse(-2, -12, 10, 14, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = darkColor; ctx.lineWidth = 5; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(18, -5); const trunkWave = Math.sin(animFrame * 0.15) * 5;
            ctx.quadraticCurveTo(28, 0 + trunkWave, 22, 12 + trunkWave * 0.5); ctx.stroke();
            ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(12, -12, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(13, -13, 1, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = darkColor; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(-16, 5); ctx.quadraticCurveTo(-22, 10, -20, 18); ctx.stroke();
            ctx.restore();
        }

        function drawEnemy(x, y, w, h, animFrame) {
            const squish = Math.sin(animFrame * 0.3) * 3;
            ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.moveTo(x - w/2, y + h/2); ctx.quadraticCurveTo(x, y - h/2 - squish, x + w/2, y + h/2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x - 6, y - 2, 5, 0, Math.PI * 2); ctx.arc(x + 6, y - 2, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(x - 6 + Math.sin(animFrame * 0.1) * 2, y - 2, 2, 0, Math.PI * 2); ctx.arc(x + 6 + Math.sin(animFrame * 0.1) * 2, y - 2, 2, 0, Math.PI * 2); ctx.fill();
        }

        function drawCoin(x, y, animFrame) {
            const bounce = Math.sin(animFrame * 0.1) * 3;
            ctx.fillStyle = '#3498db'; ctx.beginPath(); ctx.arc(x, y + bounce, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#5dade2'; ctx.beginPath(); ctx.arc(x - 3, y + bounce - 3, 4, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x, y + bounce - 10); ctx.lineTo(x + 3, y + bounce - 16); ctx.stroke();
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.ellipse(x + 5, y + bounce - 14, 4, 2, 0.5, 0, Math.PI * 2); ctx.fill();
        }

        function drawFlag(x, y) {
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x - 2, y, 4, 100);
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 40, y + 15); ctx.lineTo(x, y + 30); ctx.fill();
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#f39c12'); gradient.addColorStop(0.5, '#e67e22'); gradient.addColorStop(1, '#d35400');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            const sunOffset = (camera.x * 0.1) % 400;
            for (let i = -1; i < 4; i++) { const sx = i * 400 - sunOffset; ctx.beginPath(); ctx.arc(sx + 200, 100, 60, 0, Math.PI * 2); ctx.fill(); }
            ctx.fillStyle = '#c0392b';
            for (let i = -1; i < 6; i++) { const px = i * 500 - (camera.x * 0.2) % 500; ctx.beginPath(); ctx.moveTo(px, canvas.height); ctx.lineTo(px + 150, canvas.height - 150); ctx.lineTo(px + 300, canvas.height); ctx.fill(); }
        }

        function drawPlatform(p) {
            ctx.fillStyle = '#d4a373'; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, p.h);
            ctx.fillStyle = '#e9c46a'; ctx.fillRect(p.x - camera.x, p.y - camera.y, p.w, 6);
            ctx.fillStyle = '#f4a261';
            for (let i = 0; i < p.w; i += 25) { ctx.fillRect(p.x - camera.x + i, p.y - camera.y + 6, 15, 4); }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w && rect1.x + rect1.width > rect2.x && rect1.y < rect2.y + rect2.h && rect1.y + rect1.height > rect2.y;
        }

        function initLevel(levelIndex) {
            currentLevelData = JSON.parse(JSON.stringify(levels[levelIndex]));
            player.x = 50; player.y = 300; player.vx = 0; player.vy = 0; player.dead = false; player.invincible = 0; camera.x = 0; particles = [];
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            if (keys['ArrowLeft'] || keys['a'] || keys['A'] || touchInput.left) { player.vx -= 1; player.facing = -1; }
            if (keys['ArrowRight'] || keys['d'] || keys['D'] || touchInput.right) { player.vx += 1; player.facing = 1; }
            if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '] || touchInput.jump) && player.onGround) { player.vy = JUMP_FORCE; player.onGround = false; playSound('jump'); createParticles(player.x, player.y + player.height, '#e9c46a', 3); }
            player.vx *= FRICTION; player.vy += GRAVITY;
            player.vx = Math.max(-MOVE_SPEED, Math.min(MOVE_SPEED, player.vx));
            player.x += player.vx;
            for (const p of currentLevelData.platforms) { if (checkCollision(player, p)) { if (player.vx > 0) { player.x = p.x - player.width; } else if (player.vx < 0) { player.x = p.x + p.w; } player.vx = 0; } }
            player.y += player.vy; player.onGround = false;
            for (const p of currentLevelData.platforms) { if (checkCollision(player, p)) { if (player.vy > 0) { player.y = p.y - player.height; player.onGround = true; player.vy = 0; } else if (player.vy < 0) { player.y = p.y + p.h; player.vy = 0; } } }
            if (player.y > canvas.height + 100) playerDie();
            player.x = Math.max(0, Math.min(currentLevelData.width - player.width, player.x));
            if (Math.abs(player.vx) > 0.1) player.animTimer++;
            if (player.invincible > 0) player.invincible--;
            for (const enemy of currentLevelData.enemies) {
                enemy.x += enemy.vx;
                if (enemy.x <= enemy.minX || enemy.x >= enemy.maxX) enemy.vx *= -1;
                if (player.invincible <= 0 && !player.dead) {
                    const enemyRect = { x: enemy.x - enemy.w/2, y: enemy.y - enemy.h/2, w: enemy.w, h: enemy.h };
                    if (checkCollision(player, enemyRect)) {
                        if (player.vy > 0 && player.y + player.height - player.vy < enemyRect.y + enemyRect.h/2) { enemy.y = 10000; player.vy = JUMP_FORCE * 0.7; playSound('hit'); createParticles(enemy.x, enemy.y, '#e74c3c', 8); score += 50; }
                        else playerDie();
                    }
                }
            }
            for (const coin of currentLevelData.coins) {
                if (!coin.collected) { const dx = player.x + player.width/2 - coin.x; const dy = player.y + player.height/2 - coin.y; if (Math.sqrt(dx*dx + dy*dy) < 25) { coin.collected = true; score += 10; playSound('coin'); createParticles(coin.x, coin.y, '#3498db', 6); } }
            }
            const flag = currentLevelData.flag;
            if (player.x > flag.x - 20 && player.y > flag.y - 100 && player.y < flag.y + 100) {
                playSound('win'); gameState = 'LEVEL_COMPLETE';
                setTimeout(() => { currentLevel++; if (currentLevel >= levels.length) { localStorage.setItem('world2_completed', '3'); gameState = 'WIN'; } else { initLevel(currentLevel); gameState = 'PLAYING'; } }, 2000);
            }
            const targetCamX = player.x - canvas.width / 3;
            camera.x += (targetCamX - camera.x) * 0.1;
            camera.x = Math.max(0, Math.min(currentLevelData.width - canvas.width, camera.x));
            for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02; if (p.life <= 0) particles.splice(i, 1); }
            document.getElementById('scoreText').textContent = `💎 ${score}`;
            document.getElementById('livesText').textContent = `❤️ ${lives}`;
            document.getElementById('levelText').textContent = `Nivel ${currentLevel + 1}/3`;
        }

        function playerDie() {
            if (player.dead) return;
            player.dead = true; lives--; playSound('hit');
            createParticles(player.x + player.width/2, player.y + player.height/2, '#7a8b99', 15);
            setTimeout(() => { if (lives <= 0) gameState = 'GAMEOVER'; else { player.x = 50; player.y = 300; player.vx = 0; player.vy = 0; player.dead = false; player.invincible = 60; } }, 1000);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            if (gameState === 'MENU') { drawMenu(); return; }
            if (gameState === 'GAMEOVER') { drawGameOver(); return; }
            if (gameState === 'WIN') { drawWin(); return; }
            if (currentLevelData) {
                for (const p of currentLevelData.platforms) { if (p.x - camera.x > -p.w && p.x - camera.x < canvas.width) drawPlatform(p); }
                const flag = currentLevelData.flag; if (flag.x - camera.x > -50 && flag.x - camera.x < canvas.width + 50) drawFlag(flag.x - camera.x, flag.y - camera.y);
                for (const coin of currentLevelData.coins) { if (!coin.collected && coin.x - camera.x > -20 && coin.x - camera.x < canvas.width + 20) drawCoin(coin.x - camera.x, coin.y - camera.y, player.animTimer); }
                for (const enemy of currentLevelData.enemies) { if (enemy.x - camera.x > -50 && enemy.x - camera.x < canvas.width + 50) drawEnemy(enemy.x - camera.x, enemy.y - camera.y + enemy.h/2, enemy.w, enemy.h, player.animTimer); }
            }
            for (const p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x - camera.x - 2, p.y - camera.y - 2, 4, 4); }
            ctx.globalAlpha = 1;
            if (!player.dead && gameState === 'PLAYING') {
                const alpha = player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0 ? 0.5 : 1;
                ctx.globalAlpha = alpha;
                drawElephant(player.x - camera.x + player.width/2, player.y - camera.y + player.height/2, 1.2, player.facing, player.animTimer);
                ctx.globalAlpha = 1;
            }
            if (gameState === 'LEVEL_COMPLETE') { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center'; ctx.fillText('¡NIVEL COMPLETADO!', canvas.width/2, canvas.height/2); }
        }

        function drawMenu() {
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawElephant(canvas.width/2, canvas.height/2 - 50, 3, 1, Date.now() / 50);
            ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10;
            ctx.fillText('DESIERTO DORADO', canvas.width/2, canvas.height/2 + 60); ctx.shadowBlur = 0;
            ctx.fillStyle = 'white'; ctx.font = '22px Arial'; ctx.fillText('Mundo 2 - Presiona ESPACIO para jugar', canvas.width/2, canvas.height/2 + 110);
            ctx.font = '16px Arial'; ctx.fillStyle = '#bdc3c7'; ctx.fillText('← → Mover | ESPACIO Saltar', canvas.width/2, canvas.height/2 + 145);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e74c3c'; ctx.font = 'bold 56px Arial'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 30);
            ctx.fillStyle = 'white'; ctx.font = '28px Arial'; ctx.fillText(`Puntuación: ${score}`, canvas.width/2, canvas.height/2 + 20);
            ctx.font = '20px Arial'; ctx.fillStyle = '#bdc3c7'; ctx.fillText('Presiona ESPACIO para reiniciar', canvas.width/2, canvas.height/2 + 60);
        }

        function drawWin() {
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 50; i++) { const x = (Date.now() / 10 + i * 137) % canvas.width; const y = (Date.now() / 5 + i * 89) % canvas.height; ctx.fillStyle = `hsl(${(i * 50) % 360}, 70%, 50%)`; ctx.fillRect(x, y, 8, 8); }
            drawElephant(canvas.width/2, canvas.height/2 - 80, 2.5, 1, Date.now() / 30);
            ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center'; ctx.fillText('¡MUNDO COMPLETADO!', canvas.width/2, canvas.height/2 + 40);
            ctx.fillStyle = 'white'; ctx.font = '26px Arial'; ctx.fillText(`Puntuación: ${score}`, canvas.width/2, canvas.height/2 + 85);
            ctx.font = '18px Arial'; ctx.fillStyle = '#bdc3c7'; ctx.fillText('Presiona ESPACIO para volver al menú', canvas.width/2, canvas.height/2 + 125);
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault(); initAudio();
                if (gameState === 'MENU') { gameState = 'PLAYING'; initLevel(0); }
                else if (gameState === 'GAMEOVER') { score = 0; lives = 3; currentLevel = 0; initLevel(0); gameState = 'PLAYING'; }
                else if (gameState === 'WIN') { window.location.href = 'index.html'; }
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function setupTouch(btn, key) {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); touchInput[key] = true; initAudio(); if (gameState === 'MENU') { gameState = 'PLAYING'; initLevel(0); } else if (gameState === 'GAMEOVER' || gameState === 'WIN') { score = 0; lives = 3; currentLevel = 0; initLevel(0); gameState = 'PLAYING'; } });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); touchInput[key] = false; });
            btn.addEventListener('mousedown', (e) => { touchInput[key] = true; });
            btn.addEventListener('mouseup', (e) => { touchInput[key] = false; });
        }
        setupTouch(document.getElementById('btnLeft'), 'left');
        setupTouch(document.getElementById('btnRight'), 'right');
        setupTouch(document.getElementById('btnJump'), 'jump');

        canvas.addEventListener('click', () => { initAudio(); if (gameState === 'MENU') { gameState = 'PLAYING'; initLevel(0); } else if (gameState === 'GAMEOVER') { score = 0; lives = 3; currentLevel = 0; initLevel(0); gameState = 'PLAYING'; } else if (gameState === 'WIN') { window.location.href = 'index.html'; } });
        canvas.addEventListener('touchstart', (e) => { initAudio(); if (gameState === 'MENU') { e.preventDefault(); gameState = 'PLAYING'; initLevel(0); } });

        function goBack() { window.location.href = 'index.html'; }

        gameLoop();
    </script>
</body>
